<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="lumii-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17171f"/>
      <stop offset="1" stop-color="#08080c"/>
    </linearGradient>
    <linearGradient id="lumii-l" x1="20" y1="14" x2="48" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#ff5a00"/>
    </linearGradient>
    <filter id="lumii-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#lumii-bg)"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="15.25" stroke="#ffffff" stroke-opacity="0.07"/>

  <g filter="url(#lumii-glow)">
    <rect x="20" y="15" width="10" height="34" rx="5" fill="url(#lumii-l)"/>
    <rect x="20" y="39" width="26" height="10" rx="5" fill="url(#lumii-l)"/>
  </g>

  <circle cx="43" cy="19" r="4.6" fill="#ffd089" filter="url(#lumii-glow)"/>
</svg>
