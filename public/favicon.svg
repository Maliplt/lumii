<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Premium dark background squircle -->
  <rect width="512" height="512" rx="144" fill="#050505" stroke="#A91D3A" stroke-width="20" />
  
  <defs>
    <!-- Brand crimson gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F24C6D" />
      <stop offset="50%" stop-color="#A91D3A" />
      <stop offset="100%" stop-color="#7A1025" />
    </linearGradient>
    
    <!-- Glowing shadow effect for premium feel -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing shadow behind the 'T' -->
  <path d="M 120 150 H 392 V 225 H 296 V 380 H 216 V 225 H 120 Z" fill="#A91D3A" opacity="0.35" filter="url(#glow)" />

  <!-- The stylized geometric 'T' in Unbounded blocky/modern style -->
  <path d="M 120 140 H 392 V 215 H 296 V 370 H 216 V 215 H 120 Z" fill="url(#brandGrad)" />
</svg>